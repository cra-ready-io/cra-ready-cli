name: Feature request
description: Suggest an enhancement or new capability for the CLI.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the CLI makes hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? CLI surface, flags, or behavior changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, related issues.
