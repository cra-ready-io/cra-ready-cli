name: Bug report
description: Something isn't working the way the docs or `--help` say it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can — the more reproducible the report, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the problem.
      placeholder: "Running `cra-ready upload` against a pnpm workspace fails with..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands you ran, plus any relevant `cra-ready.yml` (redact tokens).
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: Output of `cra-ready --version`.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "macOS 14.5, Ubuntu 22.04, GitHub Actions ubuntu-latest, ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Re-run with `DEBUG=1` and paste the output. Redact tokens.
      render: shell
